<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Primer Login</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#5048e5",
              "background-light": "#f6f6f8",
              "background-dark": "#121121",
              "slate-900": "#0f172a",
              "slate-100": "#f1f5f9",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            boxShadow: {
                "soft": "0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)",
                "glow": "0 0 0 3px rgba(80, 72, 229, 0.2)",
            }
          },
        },
      }
    </script>
<style>
        /* Custom subtle gradient background as requested */
        .bg-primer-gradient {
            background: linear-gradient(135deg, #F9FAFB 0%, #E5E7EB 100%);
        }
    </style>
</head>
<body class="font-display bg-primer-gradient min-h-screen flex items-center justify-center p-4">
<!-- Main Container -->
<div class="w-full max-w-[440px] bg-white rounded-xl shadow-soft border border-gray-200 overflow-hidden relative">
<!-- Decorative Top Border -->
<div class="h-1.5 w-full bg-primary"></div>
<div class="p-8 sm:p-10 flex flex-col gap-6">
<!-- Header Section -->
<div class="flex flex-col gap-2 items-center text-center">
<!-- Logo / Icon -->
<div class="w-12 h-12 bg-primary/10 rounded-lg flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-primary text-3xl">hub</span>
</div>
<h1 class="text-slate-900 text-2xl font-bold tracking-tight">Welcome to Primer</h1>
<p class="text-gray-500 text-sm font-normal">Enter your details to access your system diagrams.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-5">
<!-- Email Input -->
<div class="flex flex-col gap-1.5">
<label class="text-slate-900 text-sm font-medium" for="email">Email address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 text-[20px]">mail</span>
</div>
<input class="form-input block w-full pl-10 pr-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-slate-900 text-sm placeholder:text-gray-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="text-slate-900 text-sm font-medium" for="password">Password</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 text-[20px]">lock</span>
</div>
<input class="form-input block w-full pl-10 pr-10 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-slate-900 text-sm placeholder:text-gray-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="password" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 transition-colors cursor-pointer" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<div class="flex justify-end pt-1">
<a class="text-primary hover:text-primary/80 text-xs font-semibold transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Submit Button -->
<button class="mt-2 w-full flex justify-center items-center gap-2 bg-primary hover:bg-primary/90 text-white font-semibold py-2.5 px-4 rounded-lg shadow-sm transition-all duration-200 focus:ring-2 focus:ring-offset-2 focus:ring-primary" type="submit">
                    Log in
                    <span class="material-symbols-outlined text-[18px] font-bold">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="px-2 bg-white text-gray-500 uppercase tracking-wider font-medium">Or continue with</span>
</div>
</div>
<!-- Social Login Buttons -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 bg-white border border-gray-200 hover:bg-gray-50 text-slate-900 font-medium py-2 px-4 rounded-lg transition-colors text-sm" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<button class="flex items-center justify-center gap-2 bg-white border border-gray-200 hover:bg-gray-50 text-slate-900 font-medium py-2 px-4 rounded-lg transition-colors text-sm" type="button">
<svg aria-hidden="true" class="w-5 h-5 text-slate-900" fill="currentColor" viewbox="0 0 24 24">
<path clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" fill-rule="evenodd"></path>
</svg>
                    GitHub
                </button>
</div>
<!-- Footer Section -->
<div class="text-center pt-2">
<p class="text-sm text-gray-500">
                    New to Primer? 
                    <a class="font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Create an account</a>
</p>
</div>
</div>
</div>
</body></html>
